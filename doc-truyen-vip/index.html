<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DocTruyen VIP</title>
  <style>
    :root{--bg:#f6f8f5;--card:#fff;--text:#142017;--muted:#667466;--line:#dfe8df;--green:#15803d;--soft:#dcfce7;--gold:#f59e0b;--shadow:0 18px 50px rgba(15,23,42,.1)}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif}a{color:inherit;text-decoration:none}button,input{font:inherit}.shell{display:grid;grid-template-columns:270px 1fr;min-height:100vh}.side{position:sticky;top:0;height:100vh;padding:22px;border-right:1px solid var(--line);background:#fbfdf9}.brand{display:flex;gap:12px;align-items:center}.mark{display:grid;place-items:center;width:42px;height:42px;border-radius:8px;background:var(--green);color:#fff;font-weight:900}.brand small{display:block;color:var(--muted)}nav{display:grid;gap:6px;margin:30px 0}nav a{padding:11px 12px;border-radius:8px;color:var(--muted);font-weight:750}nav a:hover,nav a.active{background:var(--soft);color:var(--green)}.side-card,.card,.panel,.modal{border:1px solid var(--line);border-radius:8px;background:var(--card)}.side-card{padding:16px}.main{min-width:0}.top{position:sticky;top:0;z-index:5;display:flex;gap:14px;align-items:center;padding:16px 28px;border-bottom:1px solid var(--line);background:rgba(246,248,245,.88);backdrop-filter:blur(16px)}.search{display:flex;gap:10px;align-items:center;width:min(580px,100%);padding:11px 14px;border:1px solid var(--line);border-radius:8px;background:#fff}.search span{color:var(--muted);font-weight:800}.search input{border:0;outline:0;width:100%;background:transparent}.account{margin-left:auto;display:flex;gap:8px;align-items:center;white-space:nowrap}.chip,.tag{display:inline-flex;align-items:center;min-height:28px;padding:5px 9px;border-radius:999px;background:#eef4ef;color:var(--muted);font-size:12px;font-weight:800}.chip.vip{background:#fef3c7;color:#92400e}.view{padding:28px}.hero{display:grid;grid-template-columns:minmax(0,1.3fr) minmax(310px,.7fr);gap:18px}.hero-main{min-height:320px;padding:clamp(24px,5vw,54px);border:1px solid var(--line);border-radius:8px;background:linear-gradient(135deg,rgba(255,255,255,.96),rgba(255,255,255,.75)),radial-gradient(circle at 80% 20%,rgba(34,197,94,.22),transparent 28%),linear-gradient(145deg,#ecfccb,#dbeafe)}.eyebrow{color:var(--green);font-size:12px;font-weight:900;letter-spacing:.08em;text-transform:uppercase}h1{margin:10px 0 12px;font-size:clamp(36px,6vw,66px);line-height:.96}h2,h3{margin:0 0 10px}p{line-height:1.65}.muted{color:var(--muted)}.actions,.row,.reader-tools{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:40px;padding:10px 14px;border:0;border-radius:8px;cursor:pointer;font-weight:850}.primary{background:var(--green);color:#fff}.secondary{border:1px solid var(--line);background:#fff;color:var(--text)}.danger{background:#fee2e2;color:#991b1b}.section{display:flex;align-items:end;justify-content:space-between;margin:30px 0 14px;gap:16px}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.card{overflow:hidden}.cover{min-height:170px;padding:16px;color:#fff;display:flex;align-items:end}.cover strong{font-size:25px;line-height:1.05;text-shadow:0 2px 16px rgba(0,0,0,.35)}.body{padding:15px}.tags{display:flex;gap:6px;flex-wrap:wrap}.body p{min-height:76px;color:var(--muted)}.panel{padding:18px;box-shadow:var(--shadow)}.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:18px}.metric{border:1px solid var(--line);border-radius:8px;background:#fff;padding:14px}.metric strong{display:block;font-size:22px}.detail{display:grid;grid-template-columns:300px 1fr;gap:20px;align-items:start}.detail-cover{min-height:420px;border-radius:8px;padding:22px;color:#fff;display:flex;align-items:end;box-shadow:var(--shadow)}.chapters{display:grid;gap:10px;margin-top:18px}.chapter{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;padding:14px;border:1px solid var(--line);border-radius:8px;background:#fff}.reader{max-width:840px;margin:0 auto}.reader-tools{position:sticky;top:86px;z-index:4;padding:12px;border:1px solid var(--line);border-radius:8px;background:rgba(255,255,255,.94)}.reader-text{margin-top:22px;padding:clamp(20px,5vw,46px);border:1px solid var(--line);border-radius:8px;background:#fffef8}.reader-text p{font-family:Georgia,serif;font-size:var(--size,19px);line-height:1.95;color:#1f2937}.paywall{padding:28px;border:1px solid #fde68a;border-radius:8px;background:#fffbeb}.plans{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.price{display:block;margin:8px 0;font-size:24px;font-weight:900}.backdrop{position:fixed;inset:0;z-index:20;display:grid;place-items:center;padding:18px;background:rgba(15,23,42,.45)}.backdrop[hidden]{display:none}.modal{width:min(560px,100%);padding:24px;position:relative;box-shadow:var(--shadow)}.close{position:absolute;right:12px;top:12px}.qr{display:grid;place-items:center;width:min(260px,100%);aspect-ratio:1;margin:18px auto;border:12px solid #fff;border-radius:8px;background:linear-gradient(90deg,#111827 12px,transparent 12px) 0 0/28px 28px,linear-gradient(#111827 12px,transparent 12px) 0 0/28px 28px,#fff;box-shadow:inset 0 0 0 1px var(--line),var(--shadow)}.qr span{padding:8px 10px;border-radius:6px;background:#fff;font-weight:900}.toast{position:fixed;right:16px;bottom:16px;z-index:30;width:min(360px,calc(100vw - 32px));padding:12px 14px;border-radius:8px;background:#111827;color:#fff;box-shadow:var(--shadow)}.menu{display:none}.dark{--bg:#111827;--card:#172033;--text:#f9fafb;--muted:#aeb7c4;--line:#2f3b4e}.dark .reader-text{background:#0f172a}.dark .reader-text p{color:#e5e7eb}.dark .secondary,.dark .search{background:#172033;color:#fff}@media(max-width:980px){.shell{grid-template-columns:1fr}.side{position:fixed;z-index:15;inset:0 auto 0 0;width:min(310px,88vw);transform:translateX(-105%);transition:.18s;box-shadow:var(--shadow)}.side.open{transform:translateX(0)}.menu{display:inline-flex}.hero,.detail{grid-template-columns:1fr}.grid,.plans,.metrics{grid-template-columns:repeat(2,1fr)}}@media(max-width:680px){.top{padding:12px}.account{display:none}.view{padding:16px}.grid,.plans,.metrics{grid-template-columns:1fr}.section,.row{align-items:stretch;flex-direction:column}h1{font-size:40px}}
  </style>
</head>
<body>
  <div class="shell">
    <aside class="side" id="side"><a class="brand" href="#/"><span class="mark">D</span><span><b>DocTruyen VIP</b><small>Thu vien truyen thu phi</small></span></a><nav><a href="#/" data-nav="home">Trang chu</a><a href="#/library" data-nav="library">Thu vien</a><a href="#/wallet" data-nav="wallet">Nap xu</a><a href="#/admin" data-nav="admin">Admin</a></nav><div class="side-card"><span class="eyebrow">Goi de xuat</span><h3>VIP 30 ngay</h3><p class="muted">Mo khoa toan bo chuong VIP va doc khong gioi han.</p><button class="btn primary" data-plan="vip30">Mua VIP</button></div></aside>
    <main class="main"><header class="top"><button class="btn secondary menu" id="menu">Menu</button><label class="search"><span>Tim</span><input id="q" placeholder="Tim truyen, tac gia, the loai..."></label><div class="account" id="account"></div></header><section class="view" id="view"></section></main>
  </div>
  <div class="backdrop" id="modal" hidden><section class="modal"><button class="btn secondary close" id="close">X</button><div id="modalBody"></div></section></div>
<script>
const stories=[{id:'tan-the-bac-ha',title:'Tan The Bac Ha',author:'Minh Chau',status:'Dang ra',genre:['Mat the','Sinh ton','Do thi'],cover:'linear-gradient(145deg,#d9f99d,#38bdf8 55%,#111827)',summary:'Khi thanh pho chim vao su im lang bat thuong, Kha mang theo mot cuon so cu va loi hua voi em gai de tim duong song sot.',reads:128450,rating:4.8,chapters:[{id:'c1',title:'Chuong 1: Tieng chuong luc 0 gio',free:true,price:0,body:['Dem dau tien mat dien, Bac Ha khong con giong mot thanh pho nua. Nhung toa nha cao tang dung yen nhu cac khoi da den.','Kha dung trong cua hang tien loi, tay nam chat canh cua sat. Ben ngoai, tieng loa phuong vang len roi dut ngang.','Trong tui ao khoac cua cau la cuon so cua bo. Trang dau tien chi co mot cau: Neu chuong nha tho do ba lan luc nua dem, dung o lai thanh pho.']},{id:'c2',title:'Chuong 2: Tram cuu ho bo hoang',free:true,price:0,body:['Binh minh len cham, va cung voi no la mui khoi khang khac tu phia cho cu.','Tram cuu ho nam o cuoi duong Nguyen Trai. Cua kinh vo, ben trong co dau chan bun va mot vet mau keo dai.','Kha tim thay mot bo dam cu. No chi phat ra tieng re re va mot giong noi lap lai: Ai con song, dung di ve phia bac.']},{id:'c3',title:'Chuong 3: Nguoi gac cau',free:false,price:8,body:['Cay cau sat bac qua song Van Da da bi chan bang ba chiec xe buyt.','Muon qua cau thi de lai do an, nguoi gac cau noi. Kha nhin tui luong kho cua minh.','Nguoi dan ong cuoi nhe. Khong phai ta can do an. Ta can biet cau co du thong minh de song tiep hay khong.']},{id:'c4',title:'Chuong 4: Kho du lieu ngam',free:false,price:10,body:['Duoi tang ham cua thu vien tinh la mot can phong khong co trong so do.','May chu van chay nho bo phat dien rieng. Tren man hinh chinh hien len: Du an Bac Ha - Da kich hoat.','Luc nay Kha moi hieu, thanh pho khong phai bi tan pha. No dang duoc thu nghiem.']}]},{id:'long-mon-quan',title:'Long Mon Quan',author:'Ha Dinh',status:'Hoan thanh',genre:['Kiem hiep','Huyen nghi'],cover:'linear-gradient(145deg,#fef3c7,#16a34a 50%,#0f172a)',summary:'Mot quan tro nam o cua ai phia tay chi mo cua vao dem mua, noi moi loi noi doi deu phai tra gia bang mot ky uc.',reads:86720,rating:4.6,chapters:[{id:'c1',title:'Chuong 1: Khach den luc mua roi',free:true,price:0,body:['Tran mua dau ha roi xuong Long Mon Quan vao luc gio tuan.','Chu quan khong hoi ten. O vung nay, hoi ten mot nguoi la moi goi qua khu cua nguoi do buoc vao cung.','Nguoi tre tuoi dat mot dong bac len ban. Ta chi can mot phong, mot bat chao, va mot dem khong ai nho den ta.']},{id:'c2',title:'Chuong 2: Can phong khong cua so',free:false,price:7,body:['Can phong cuoi day khong co cua so, nhung dem nao cung co anh trang roi tren san.','Bong do khong cam kiem. No cam mot la thu cu, tren do la net chu cua me chang.','Long Mon Quan khong ban cho khach cho ngu. No ban cho ho co hoi noi that.']}]},{id:'tram-radio-so-9',title:'Tram Radio So 9',author:'Lan Vy',status:'Dang ra',genre:['Khoa hoc','Bi an','Tinh cam'],cover:'linear-gradient(145deg,#e0e7ff,#22c55e 45%,#020617)',summary:'Moi toi luc 21:09, mot tram radio khong ton tai phat di thong diep tu ngay mai.',reads:55210,rating:4.7,chapters:[{id:'c1',title:'Chuong 1: Tan so 91.9',free:true,price:0,body:['Mai nghe thay ten minh trong radio cu cua ong noi vao dung 21:09.','Nguoi co ten Nguyen Ha Mai khong duoc len chuyen tau 6 gio 30 sang mai.','Sang hom sau, chuyen tau do bien mat khoi lich trinh nhu chua tung ton tai.']},{id:'c2',title:'Chuong 2: Tin nhan tu ngay thu nam',free:false,price:9,body:['Lan nay radio khong phat canh bao. No phat mot ban nhac ngan, sau do la tieng Mai cua nam ngay sau.','Dung tin anh ta, giong noi noi. Va dung tat radio, du co chuyen gi xay ra.','Mai nhin vao cua kinh. Phia sau co, trong anh phan chieu, mot nguoi dan ong la mat dang mim cuoi.']}]}];
const plans={vip30:{title:'VIP 30 ngay',price:49000,type:'vip',days:30,desc:'Doc toan bo chuong khoa trong 30 ngay.'},coins50:{title:'Goi 50 xu',price:50000,type:'coins',coins:50,desc:'Dung de mo tung chuong VIP.'},coins120:{title:'Goi 120 xu',price:100000,type:'coins',coins:120,desc:'Tiet kiem hon cho doc gia doc dai ky.'}};
let st=JSON.parse(localStorage.dtv||'null')||{coins:18,vipUntil:null,unlocked:{},tx:[],size:19,dark:false,last:{s:'tan-the-bac-ha',c:'c2'}};const $=s=>document.querySelector(s),money=n=>new Intl.NumberFormat('vi-VN',{style:'currency',currency:'VND'}).format(n),vip=()=>st.vipUntil&&new Date(st.vipUntil)>new Date(),save=()=>{localStorage.dtv=JSON.stringify(st);account()},story=id=>stories.find(x=>x.id===id),chap=(s,c)=>story(s).chapters.find(x=>x.id===c),key=(s,c)=>s+':'+c,can=(s,c)=>c.free||vip()||st.unlocked[key(s,c.id)];
function account(){$('#account').innerHTML=`<span class="chip ${vip()?'vip':''}">${vip()?'VIP den '+new Date(st.vipUntil).toLocaleDateString('vi-VN'):'Free'}</span><span class="chip">${st.coins} xu</span><button class="btn primary" data-plan="coins50">Nap xu</button>`}
function card(x){return `<article class="card"><a class="cover" href="#/story/${x.id}" style="background:${x.cover}"><strong>${x.title}</strong></a><div class="body"><div class="tags">${x.genre.map(g=>`<span class="tag">${g}</span>`).join('')}</div><h3>${x.title}</h3><p>${x.summary}</p><div class="row"><span class="muted">${x.chapters.length} chuong</span><a class="btn secondary" href="#/story/${x.id}">Chi tiet</a></div></div></article>`}
function home(){let s=story(st.last.s),c=chap(st.last.s,st.last.c);view.innerHTML=`<section class="hero"><div class="hero-main"><span class="eyebrow">MVP doc truyen thu phi</span><h1>Thu vien truyen co paywall, VIP va nap xu.</h1><p class="muted">Ban dau dung payOS/VietQR mock de chay thu. Khi co key that, thay API tao don va webhook la co the charge phi tu doc gia Viet Nam.</p><div class="actions"><a class="btn primary" href="#/read/${st.last.s}/${st.last.c}">Doc tiep</a><a class="btn secondary" href="#/library">Xem thu vien</a><button class="btn secondary" data-plan="vip30">Mua VIP</button></div></div><aside class="panel"><span class="eyebrow">Dang doc</span><h2>${s.title}</h2><p class="muted">${c.title}</p><div class="metrics"><div class="metric"><span class="muted">Xu</span><strong>${st.coins}</strong></div><div class="metric"><span class="muted">VIP</span><strong>${vip()?'Co':'Chua'}</strong></div><div class="metric"><span class="muted">Mo khoa</span><strong>${Object.keys(st.unlocked).length}</strong></div></div></aside></section><div class="section"><div><span class="eyebrow">Truyen moi</span><h2>De doc va de ban goi VIP</h2></div><a class="btn secondary" href="#/library">Tat ca</a></div><section class="grid">${stories.map(card).join('')}</section><div class="section"><h2>Goi charge phi de test</h2></div><section class="plans">${Object.entries(plans).map(([id,p])=>plan(id,p)).join('')}</section>`}
function plan(id,p){return `<article class="panel"><span class="eyebrow">${p.type==='vip'?'VIP':'Nap xu'}</span><h3>${p.title}</h3><span class="price">${money(p.price)}</span><p class="muted">${p.desc}</p><button class="btn primary" data-plan="${id}">Thanh toan</button></article>`}
function library(){let q=$('#q').value.toLowerCase();let xs=stories.filter(s=>(s.title+s.author+s.genre.join(' ')+s.summary).toLowerCase().includes(q));view.innerHTML=`<div class="section"><div><span class="eyebrow">Thu vien</span><h1>Truyen dang ban</h1></div><button class="btn primary" data-plan="vip30">Len VIP</button></div><section class="grid">${xs.map(card).join('')||'<div class="panel muted">Khong tim thay truyen.</div>'}</section>`}
function detail(id){let s=story(id);view.innerHTML=`<section class="detail"><div class="detail-cover" style="background:${s.cover}"><h1>${s.title}</h1></div><div><span class="eyebrow">${s.status}</span><h1>${s.title}</h1><p class="muted">Tac gia: ${s.author} · ${s.reads.toLocaleString('vi-VN')} luot doc · ${s.rating}/5</p><div class="tags">${s.genre.map(g=>`<span class="tag">${g}</span>`).join('')}</div><p>${s.summary}</p><div class="actions"><a class="btn primary" href="#/read/${s.id}/${s.chapters[0].id}">Doc tu dau</a><button class="btn secondary" data-plan="vip30">Mua VIP</button></div><div class="chapters">${s.chapters.map(c=>`<article class="chapter"><div><b>${c.title}</b><br><span class="muted">${c.free?'Mien phi':can(s.id,c)?'Da mo khoa':c.price+' xu hoac VIP'}</span></div><a class="btn ${can(s.id,c)?'primary':'secondary'}" href="#/read/${s.id}/${c.id}">${can(s.id,c)?'Doc':'Mo khoa'}</a></article>`).join('')}</div></div></section>`}
function read(sid,cid){let s=story(sid),c=chap(sid,cid),i=s.chapters.findIndex(x=>x.id===cid),ok=can(sid,c);st.last={s:sid,c:cid};save();document.documentElement.style.setProperty('--size',st.size+'px');document.body.classList.toggle('dark',st.dark);view.innerHTML=`<article class="reader"><div class="reader-tools"><a class="btn secondary" href="#/story/${sid}">Danh sach chuong</a><div><button class="btn secondary" onclick="st.size=Math.max(16,st.size-1);save();route()">A-</button><button class="btn secondary" onclick="st.size=Math.min(24,st.size+1);save();route()">A+</button><button class="btn secondary" onclick="st.dark=!st.dark;save();route()">${st.dark?'Sang':'Toi'}</button></div></div><h1>${c.title}</h1><p class="muted">${s.title} · ${c.free?'Chuong mien phi':c.price+' xu / VIP'}</p>${ok?`<section class="reader-text">${c.body.map(p=>`<p>${p}</p>`).join('')}</section>`:`<section class="paywall"><span class="eyebrow">Chuong khoa</span><h2>${c.title}</h2><p>Can ${c.price} xu hoac VIP. Ban dang co ${st.coins} xu.</p><div class="actions"><button class="btn primary" onclick="unlock('${sid}','${cid}')">Mo bang ${c.price} xu</button><button class="btn secondary" data-plan="vip30">Mua VIP</button><button class="btn secondary" data-plan="coins50">Nap xu</button></div></section>`}<div class="reader-tools" style="position:static;margin-top:18px">${s.chapters[i-1]?`<a class="btn secondary" href="#/read/${sid}/${s.chapters[i-1].id}">Chuong truoc</a>`:'<span></span>'}${s.chapters[i+1]?`<a class="btn primary" href="#/read/${sid}/${s.chapters[i+1].id}">Chuong sau</a>`:'<span></span>'}</div></article>`}
function unlock(sid,cid){let c=chap(sid,cid);if(st.coins<c.price){toast('Khong du xu. Nap them hoac mua VIP.');checkout('coins50');return}st.coins-=c.price;st.unlocked[key(sid,cid)]=true;st.tx.unshift({t:'unlock',name:c.title,v:-c.price,date:new Date().toISOString()});save();toast('Da mo khoa chuong.');route()}
function wallet(){view.innerHTML=`<div class="section"><div><span class="eyebrow">Vi doc gia</span><h1>Nap xu va VIP</h1></div><span class="chip ${vip()?'vip':''}">${vip()?'Dang VIP':'Tai khoan free'}</span></div><section class="plans">${Object.entries(plans).map(([id,p])=>plan(id,p)).join('')}</section><div class="section"><h2>Lich su giao dich</h2></div>${st.tx.length?`<div class="panel">${st.tx.map(t=>`<p><b>${new Date(t.date).toLocaleString('vi-VN')}</b> - ${t.name} - ${t.v>0?money(t.v):t.v+' xu'}</p>`).join('')}</div>`:'<div class="panel muted">Chua co giao dich.</div>'}`}
function admin(){view.innerHTML=`<div class="section"><div><span class="eyebrow">Admin demo</span><h1>Van hanh noi dung</h1></div><button class="btn danger" onclick="localStorage.removeItem('dtv');location.reload()">Reset demo</button></div><section class="metrics"><div class="metric"><span class="muted">Tong truyen</span><strong>${stories.length}</strong></div><div class="metric"><span class="muted">Chuong khoa</span><strong>${stories.flatMap(s=>s.chapters).filter(c=>!c.free).length}</strong></div><div class="metric"><span class="muted">Giao dich</span><strong>${st.tx.length}</strong></div></section><div class="panel" style="margin-top:18px">${stories.map(s=>`<p><b>${s.title}</b> - ${s.author} - ${s.chapters.length} chuong - ${s.status}</p>`).join('')}</div>`}
function checkout(id){let p=plans[id],code='DTV'+Date.now().toString().slice(-8);modalBody.innerHTML=`<span class="eyebrow">payOS / VietQR mock</span><h2>${p.title}</h2><p class="muted">${p.desc}</p><div class="qr"><span>${code}</span></div><p><b>So tien:</b> ${money(p.price)}</p><p><b>Noi dung:</b> ${code} ${id}</p><p class="muted">Ban that se goi API payOS de tao payment link/QR va dung webhook de kich hoat goi sau khi thanh toan.</p><button class="btn primary" onclick="pay('${id}')">Mo phong da thanh toan</button>`;modal.hidden=false}
function pay(id){let p=plans[id];if(p.type==='vip'){let d=vip()?new Date(st.vipUntil):new Date();d.setDate(d.getDate()+p.days);st.vipUntil=d.toISOString()}else st.coins+=p.coins;st.tx.unshift({t:p.type,name:p.title,v:p.price,date:new Date().toISOString()});save();modal.hidden=true;toast('Da kich hoat '+p.title);route()}
function toast(m){let t=document.createElement('div');t.className='toast';t.textContent=m;document.body.append(t);setTimeout(()=>t.remove(),3000)}
function route(){let h=location.hash.replace(/^#/,'')||'/',p=h.split('/');document.querySelectorAll('[data-nav]').forEach(a=>a.classList.toggle('active',(h==='/'&&a.dataset.nav==='home')||h.includes(a.dataset.nav)));document.body.classList.toggle('dark',st.dark&&p[1]==='read');if(h==='/')home();else if(p[1]==='library')library();else if(p[1]==='story')detail(p[2]);else if(p[1]==='read')read(p[2],p[3]);else if(p[1]==='wallet')wallet();else if(p[1]==='admin')admin();else home();side.classList.remove('open')}
document.addEventListener('click',e=>{let b=e.target.closest('[data-plan]');if(b)checkout(b.dataset.plan)});q.oninput=()=>{if(location.hash!=='#/library')location.hash='#/library';else library()};menu.onclick=()=>side.classList.toggle('open');close.onclick=()=>modal.hidden=true;modal.onclick=e=>{if(e.target===modal)modal.hidden=true};onhashchange=route;account();route();
</script>
</body>
</html>
